<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аттестация ГАП 2026</title>
<style>
  :root {
    --bg: #f2f2f2;
    --card: #ffffff;
    --accent: #000000;
    --text-sec: #888888;
    --font-mono: 'Courier New', Courier, monospace;
    --correct-bg: #e7f5e9;
    --wrong-bg: #fdecea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #000;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  #app {
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  .card {
    background: var(--card);
    border-radius: 32px;
    padding: 30px 24px;
    border: 1px solid #eee;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    display: flex;
    flex-direction: column;
  }

  .stats-header {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-sec);
    margin-bottom: 8px;
  }

  .bar-rail {
    width: 100%;
    height: 6px;
    background: #e0e0e0;
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .label-mono {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-sec);
    margin-bottom: 15px;
    display: block;
  }

  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 20px;
    white-space: pre-line;
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .opt-btn {
    background: #f0f0f0;
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 14px 16px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: 0.2s;
    color: #000;
    line-height: 1.4;
  }

  .opt-btn:active:not(:disabled) { opacity: 0.7; }
  .opt-btn.selected { border-color: #000; background: #f8f8f8; }
  .opt-btn.correct { background: var(--correct-bg); border-color: #4CAF50; color: #2e7d32; font-weight: 600; }
  .opt-btn.wrong { background: var(--wrong-bg); border-color: #f44336; color: #c62828; font-weight: 600; }
  .opt-btn.missed { background: var(--correct-bg); border-color: #4CAF50; color: #2e7d32; }
  .opt-btn:disabled { cursor: default; }

  /* Multi-select hint */
  .multi-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Text input */
  .text-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    font-size: 15px;
    font-family: inherit;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: #000; }
  .text-input.correct { border-color: #4CAF50; background: var(--correct-bg); color: #2e7d32; }
  .text-input.wrong { border-color: #f44336; background: var(--wrong-bg); color: #c62828; }

  /* Order input */
  .order-hint {
    font-size: 13px;
    color: #555;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .order-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }
  .order-item {
    background: #f0f0f0;
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.4;
    color: #333;
  }

  /* Action button */
  .action-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 18px;
    font-family: var(--font-mono);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
  }
  .action-btn:active { opacity: 0.8; }
  .action-btn.secondary {
    background: #f0f0f0;
    color: #000;
    margin-top: 8px;
  }

  .dots { text-align: center; color: #ccc; letter-spacing: 8px; margin: 20px 0; font-size: 20px; }
  .score-val { font-size: 64px; font-weight: 800; text-align: center; margin: 10px 0; }
  .feedback-text {
    font-family: var(--font-mono);
    font-size: 12px;
    margin-top: 12px;
    margin-bottom: 12px;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 12px;
  }
  .feedback-text.ok { background: var(--correct-bg); color: #2e7d32; }
  .feedback-text.err { background: var(--wrong-bg); color: #c62828; }

  .answer-reveal {
    font-size: 13px;
    color: #2e7d32;
    background: var(--correct-bg);
    border-radius: 12px;
    padding: 10px 14px;
    margin-top: 12px;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  /* Match table */
  .match-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .match-table th {
    background: #f0f0f0;
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    border-radius: 8px;
  }
  .match-table td {
    padding: 8px 10px;
    vertical-align: top;
    border-bottom: 1px solid #f0f0f0;
    line-height: 1.4;
  }
  .match-table tr:last-child td { border-bottom: none; }

  /* Q number badge */
  .q-num {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 10px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #888;
    margin-bottom: 10px;
  }
</style>
</head>

// ============================================================
// QUIZ ENGINE
// ============================================================
let questions = [];
let current = 0;
let score = 0;
let multiSelected = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = shuffle([...allQuestions]);
  // For single/multi: shuffle options too
  questions = pool.map(q => {
    if (q.type === 'single') {
      const correctText = q.options[q.correct];
      const shuffled = shuffle([...q.options]);
      return { ...q, options: shuffled, correct: shuffled.indexOf(correctText) };
    }
    if (q.type === 'multi') {
      const correctTexts = q.correct.map(i => q.options[i]);
      const shuffled = shuffle([...q.options]);
      return { ...q, options: shuffled, correct: correctTexts.map(t => shuffled.indexOf(t)) };
    }
    return { ...q };
  });
  current = 0;
  score = 0;
  renderQuestion();
}

function renderStart() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div style="text-align: center;">
        <span class="label-mono">Аттестация ГАП 2026</span>
        <h2 style="font-size: 22px; margin-bottom: 10px; margin-top: 5px;">Квалификационный экзамен ГАП-ГАП</h2>
        <p style="font-size: 13px; color: #888; margin-bottom: 6px;">Главный архитектор проекта</p>
        <p style="font-size: 13px; color: #888; margin-bottom: 25px;">${allQuestions.length} вопросов · случайный порядок</p>
        <div class="dots">••••</div>
        <button class="action-btn" onclick="startQuiz()">Запустить</button>
      </div>
    </div>`;
}

function renderQuestion() {
  multiSelected = [];
  const q = questions[current];
  const pct = (current / questions.length) * 100;

  let typeLabel = 'Выберите ответ';
  if (q.type === 'multi') typeLabel = 'Выберите несколько вариантов';
  if (q.type === 'text') typeLabel = 'Введите ответ';
  if (q.type === 'order') typeLabel = 'Введите порядок цифр';

  let bodyHtml = '';

  if (q.type === 'single') {
    bodyHtml = `<div class="options">
      ${q.options.map((o, i) => `<button class="opt-btn" id="opt${i}" onclick="handleSingle(${i})">${o}</button>`).join('')}
    </div>`;
  }
  else if (q.type === 'multi') {
    const correctCount = q.correct.length;
    bodyHtml = `
      <div class="multi-hint">Отметьте ${correctCount} верных варианта</div>
      <div class="options">
        ${q.options.map((o, i) => `<button class="opt-btn" id="opt${i}" onclick="toggleMulti(${i})">${o}</button>`).join('')}
      </div>
      <button class="action-btn secondary" id="check-multi-btn" onclick="checkMulti()">Проверить</button>`;
  }
  else if (q.type === 'text') {
    bodyHtml = `
      <input class="text-input" id="text-input" type="text" placeholder="Введите ответ..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="action-btn secondary" onclick="checkText()">Проверить</button>`;
  }
  else if (q.type === 'order') {
    bodyHtml = `
      <div class="order-items">
        ${q.options.map(o => `<div class="order-item">${o}</div>`).join('')}
      </div>
      <input class="text-input" id="order-input" type="text" placeholder="Например: 1, 2, 3, 4" autocomplete="off" />
      <button class="action-btn secondary" onclick="checkOrder()">Проверить</button>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="progress-area">
      <div class="stats-header">
        <span>Вопрос ${current + 1} / ${questions.length}</span>
        <span>✓ ${score}</span>
      </div>
      <div class="bar-rail"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <span class="q-num">№${q.num}</span>
      <span class="label-mono">${typeLabel}</span>
      <div class="q-text">${q.q}</div>
      ${bodyHtml}
      <div id="feedback-area"></div>
    </div>`;

  // Auto-focus text input
  if (q.type === 'text') {
    setTimeout(() => { const el = document.getElementById('text-input'); if(el) el.focus(); }, 100);
  }
  if (q.type === 'order') {
    setTimeout(() => { const el = document.getElementById('order-input'); if(el) el.focus(); }, 100);
  }
}

// --- SINGLE ---
function handleSingle(idx) {
  const q = questions[current];
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;
  document.getElementById('opt' + q.correct).classList.add('correct');
  if (!isCorrect) document.getElementById('opt' + idx).classList.add('wrong');
  showNextBtn(isCorrect);
}

// --- MULTI ---
function toggleMulti(idx) {
  const btn = document.getElementById('opt' + idx);
  if (multiSelected.includes(idx)) {
    multiSelected = multiSelected.filter(i => i !== idx);
    btn.classList.remove('selected');
  } else {
    multiSelected.push(idx);
    btn.classList.add('selected');
  }
}

function checkMulti() {
  const q = questions[current];
  const correctSet = new Set(q.correct);
  const selectedSet = new Set(multiSelected);
  const isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(i => selectedSet.has(i));
  if (isCorrect) score++;

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById('check-multi-btn').style.display = 'none';

  q.options.forEach((_, i) => {
    const btn = document.getElementById('opt' + i);
    if (correctSet.has(i) && selectedSet.has(i)) btn.classList.add('correct');
    else if (!correctSet.has(i) && selectedSet.has(i)) btn.classList.add('wrong');
    else if (correctSet.has(i) && !selectedSet.has(i)) btn.classList.add('missed');
  });
  showNextBtn(isCorrect);
}

// --- TEXT ---
function checkText() {
  const q = questions[current];
  const input = document.getElementById('text-input');
  const val = input.value.trim().toLowerCase();
  const correct = q.correct.toLowerCase();
  const isCorrect = val === correct;
  if (isCorrect) score++;
  input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    document.getElementById('feedback-area').innerHTML = `<div class="answer-reveal">Правильный ответ: <strong>${q.correct}</strong></div>`;
  }
  showNextBtn(isCorrect, !isCorrect);
}

// --- ORDER ---
function checkOrder() {
  const q = questions[current];
  const input = document.getElementById('order-input');
  const val = input.value.trim().replace(/\s/g, '');
  const correct = q.correct.replace(/\s/g, '');
  const isCorrect = val === correct;
  if (isCorrect) score++;
  input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    document.getElementById('feedback-area').innerHTML = `<div class="answer-reveal">Правильный порядок: <strong>${q.correct}</strong></div>`;
  }
  showNextBtn(isCorrect, !isCorrect);
}

function showNextBtn(isCorrect, hasReveal = false) {
  const btnLabel = current < questions.length - 1 ? 'Далее →' : 'Завершить';
  const fb = document.getElementById('feedback-area');
  const existing = fb.innerHTML;
  fb.innerHTML = existing + `
    <div class="feedback-text ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✓ Верно' : '✗ Неверно'}</div>
    <button class="action-btn" onclick="nextQuestion()">${btnLabel}</button>`;
}

function nextQuestion() {
  current++;
  if (current < questions.length) renderQuestion();
  else renderResult();
}

function renderResult() {
  const pct = Math.round((score / questions.length) * 100);
  const msg = pct >= 75 ? '✓ Проходной балл достигнут' : '✗ Нужно больше практики';
  const msgColor = pct >= 75 ? '#2e7d32' : '#c62828';
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div style="text-align: center;">
        <span class="label-mono">Результат</span>
        <div class="score-val">${pct}%</div>
        <p style="font-family: var(--font-mono); font-size: 12px; color: ${msgColor}; text-transform: uppercase; margin-bottom: 8px;">${msg}</p>
        <div class="dots">••••</div>
        <p style="color: #666; margin-bottom: 25px; font-size: 14px;">Правильных ответов: ${score} из ${questions.length}</p>
        <button class="action-btn" onclick="location.reload()">Заново</button>
      </div>
    </div>`;
}

window.onload = renderStart;
</script>
</body>
</html>
